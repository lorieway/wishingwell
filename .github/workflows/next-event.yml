name: Calculate Next Event

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

jobs:
  calculate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install jq
        run: sudo apt-get install jq -y

      - name: Compute next event
        run: |
          dates=$(jq -r '.well[]' well.json)
          today=$(date -u +"%Y-%m-%d")

          next=""
          for d in $dates; do
            if [[ "$d" > "$today" ]]; then
              if [[ -z "$next" || "$d" < "$next" ]]; then
                next="$d"
              fi
            fi
          done

          formatted=$(date -d "$next" +"%-d %B, %Y, at %-I%P")

          printf "%s" "$formatted" > next.json

      - name: Commit update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update next.json"
          file_pattern: next.json
